site_name: Lizetka
site_description: Lizetka - tábory a jiné aktivity
site_author: Ondrej Kratochvil

# Theme configuration
theme:
  name: material
  language: cs
  custom_dir: overrides
  logo: public/favicon.ico
  favicon: public/favicon.ico
  palette:
    - scheme: default
      primary: white
      accent: custom
  font:
    text: Baloo 2
    code: Roboto Mono

# Plugins configuration
plugins:
  - search:
      separator: '[\s\u200b\-\.,!=\[\]()"`/]+'
  - minify:
      minify_html: true
  - blog:
      enabled: true
      blog_dir: .  # Directory where blog posts are located
      archive_name: Archiv
      categories_name: Témata
      # You can add more configuration options for the blog plugin as needed
  - git-revision-date-localized

# Navigation configuration
nav:
  - Nejnovější: index.md
  - Fotogalerie:
      - 2026: https://eu.zonerama.com/TaborBlata/1967081
      - 2025: https://eu.zonerama.com/TaborBlata/1480832
      - starší: https://eu.zonerama.com/rasil/3691
  - Kontakt: https://lizetka.cz/2025/05/01/spoleklizetka/

extra:
  generator: false
#  social:
#    - icon: fontawesome/regular/envelope
#      link: mailto:tabor@lizetka.cz
#    - icon: fontawesome/brands/github
#      link: https://github.com/kratoon/lizetka

# Extra CSS or JavaScript files
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-nav.js

# Markdown extensions
markdown_extensions:
#  - toc
  - tables
  - fenced_code

# Extra configuration options can be added here
